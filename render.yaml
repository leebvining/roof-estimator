services:
  - type: web
    name: ridge-quote-roof-estimator
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    disk:
      name: ridge-quote-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/data.db
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
